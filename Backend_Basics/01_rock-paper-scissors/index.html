<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock, paper, scissors</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css
"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container">
      <h1 class="mt-4">Rock, Paper, Scissors</h1>
      <hr />
      <p id="player_choice">&nbsp;</p>
      <p id="computer_choice">&nbsp;</p>
      <p class="text-danger" id="result">&nbsp;</p>
      <hr />
      <p>Choose rock, paper, or scissors!</p>
      <button class="btn btn-outline-secondary" onclick="choose(0)">
        Rock
      </button>
      <button class="btn btn-outline-danger" onclick="choose(1)">Paper</button>
      <button class="btn btn-outline-success" onclick="choose(2)">
        Scissors
      </button>
    </div>
  </body>
  <script>
    function choose(x) {
      fetch("/play?c=" + x)
        .then((response) => response.json())
        .then((data) => {
          if (x == 0) {
            document.getElementById("player_choice").innerHTML =
              "You clicked rock";
          } else if (x == 1) {
            document.getElementById("player_choice").innerHTML =
              "You clicked paper";
          } else {
            document.getElementById("player_choice").innerHTML =
              "You clicked scissors";
          }
          document.getElementById("computer_choice").innerHTML =
            data.ComputerChoice;
          document.getElementById("result").innerHTML = data.RoundResult;
        });
    }
  </script>
</html>
